<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alaprajz szerkesztő</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <header id="topbar">
      <h1>Alaprajz szerkesztő</h1>
      <span id="property-title" class="muted">– nincs ingatlan –</span>
    </header>
    <aside id="sidebar">
      <section class="panel">
        <h2>Ingatlan</h2>
        <p class="placeholder">Ingatlan és szintek kezelése – a 2. fázisban készül el.</p>
      </section>
      <section class="panel">
        <h2>Rétegek</h2>
        <ul class="layer-list">
          <li class="layer fixed">Falak, ajtók, ablakok <span class="muted">(mindig látható)</span></li>
          <li class="layer">Szaniter</li>
          <li class="layer">Konyha</li>
          <li class="layer">Bútorok</li>
          <li class="layer">Épületelemek</li>
        </ul>
      </section>
    </aside>
    <main id="canvas-wrap">
      <svg id="canvas" xmlns="http://www.w3.org/2000/svg"></svg>
      <div id="statusbar">
        <span id="coords">x: – cm · y: – cm</span>
        <span id="zoom-label">100%</span>
      </div>
    </main>
  </div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
